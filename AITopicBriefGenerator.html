<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Topic Brief Generator</title>
  
  <!-- FontAwesome for Premium Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts - Plus Jakarta Sans & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- React and Babel Standalone CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

  <style>
    :root {
      --primary: #8b5cf6;       /* Violet */
      --primary-rgb: 139, 92, 246;
      --secondary: #ec4899;     /* Pink */
      --secondary-rgb: 236, 72, 153;
      --accent: #10b981;        /* Emerald */
      --accent-rgb: 16, 185, 129;
      --warning: #f59e0b;       /* Amber */
      --danger: #ef4444;        /* Red */
      --background: #090d16;
      --card-bg: rgba(17, 25, 40, 0.65);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --text-tertiary: #6b7280;
      
      --shadow-indigo: 0 8px 30px rgba(139, 92, 246, 0.15);
      --shadow-glass: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      
      --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--background);
      color: var(--text-primary);
      font-family: 'Plus Jakarta Sans', 'Outfit', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Background Ambient Glowing Orbs */
    .bg-glow-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0.35;
      mix-blend-mode: screen;
      transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1), 
                  opacity 1.5s ease-in-out, 
                  filter 1.5s ease-in-out, 
                  background 1.5s ease-in-out;
    }

    .glow-1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--primary) 0%, rgba(139, 92, 246, 0) 70%);
      top: -10%;
      left: -10%;
      animation: float-1 30s infinite alternate ease-in-out;
    }

    .glow-2 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--secondary) 0%, rgba(236, 72, 153, 0) 70%);
      bottom: -15%;
      right: -10%;
      animation: float-2 35s infinite alternate ease-in-out;
    }

    .glow-3 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #3b82f6 0%, rgba(59, 130, 246, 0) 70%);
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.15;
      animation: float-3 40s infinite alternate ease-in-out;
    }

    /* Live Generating Animation States */
    body.generating .glow-1 {
      background: radial-gradient(circle, #ec4899 0%, rgba(236, 72, 153, 0) 70%);
      opacity: 0.55;
      filter: blur(100px);
      transform: scale(1.3);
      animation-duration: 8s;
    }

    body.generating .glow-2 {
      background: radial-gradient(circle, #3b82f6 0%, rgba(59, 130, 246, 0) 70%);
      opacity: 0.55;
      filter: blur(100px);
      transform: scale(1.3);
      animation-duration: 9s;
    }

    body.generating .glow-3 {
      background: radial-gradient(circle, #a855f7 0%, rgba(168, 85, 247, 0) 70%);
      opacity: 0.35;
      filter: blur(80px);
      transform: scale(1.4) translate(-50%, -50%);
      animation-duration: 10s;
    }

    @keyframes float-1 {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(120px, 80px) scale(1.15); }
      100% { transform: translate(-40px, 160px) scale(0.9); }
    }

    @keyframes float-2 {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-140px, -80px) scale(0.85); }
      100% { transform: translate(60px, -180px) scale(1.1); }
    }

    @keyframes float-3 {
      0% { transform: translate(-50%, -50%) rotate(0deg) scale(1); }
      50% { transform: translate(-40%, -60%) rotate(180deg) scale(1.2); }
      100% { transform: translate(-60%, -40%) rotate(360deg) scale(0.9); }
    }

    /* Grid overlay for a premium tech feel */
    .bg-grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    /* App container styling */
    .app-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      min-height: 100vh;
      justify-content: center;
    }

    header {
      text-align: center;
      margin-bottom: 8px;
    }

    .logo-container {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .logo-icon {
      font-size: 2.2rem;
      background: linear-gradient(135deg, #c084fc, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: pulse-glow 3s infinite alternate ease-in-out;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(to right, #ffffff 30%, #e2e8f0 70%, rgba(255, 255, 255, 0.8));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--text-secondary);
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* Glass Card layout */
    .glass-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 32px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow-glass);
      transition: var(--transition-smooth);
      position: relative;
      overflow: hidden;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* API Key Warning Panel */
    .api-key-panel {
      margin-bottom: 8px;
      border: 1px dashed rgba(245, 158, 11, 0.3);
      background: rgba(245, 158, 11, 0.04);
    }

    .api-key-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }

    .api-key-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--warning);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .api-key-badge {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .api-key-badge.success {
      background: rgba(16, 185, 129, 0.15);
      color: var(--accent);
    }

    .api-key-content {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: slideDown 0.25s ease-out forwards;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .input-field {
      width: 100%;
      background: rgba(17, 24, 39, 0.8);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-md);
      padding: 14px 16px 14px 46px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: var(--transition-smooth);
    }

    .input-field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .api-key-hint {
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .api-key-hint a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition-smooth);
    }

    .api-key-hint a:hover {
      text-decoration: underline;
      color: var(--secondary);
    }

    /* Form and search layout */
    .brief-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .suggestions-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .suggestion-chip {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--card-border);
      border-radius: 9999px;
      padding: 8px 16px;
      font-size: 0.85rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition-smooth);
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
    }

    .suggestion-chip:hover {
      background: rgba(139, 92, 246, 0.1);
      border-color: rgba(139, 92, 246, 0.4);
      color: var(--text-primary);
      transform: translateY(-2px);
    }

    .suggestion-chip.active {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2));
      border-color: var(--primary);
      color: var(--text-primary);
      font-weight: 500;
    }

    .generate-btn {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #ffffff;
      border: none;
      border-radius: var(--radius-md);
      padding: 16px 28px;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
      transition: var(--transition-smooth);
      position: relative;
      overflow: hidden;
    }

    .generate-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: 0.6s;
    }

    .generate-btn:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 8px 30px rgba(139, 92, 246, 0.55);
    }

    .generate-btn:hover::after {
      left: 100%;
    }

    .generate-btn:active {
      transform: translateY(1px);
    }

    .generate-btn:disabled {
      background: #1f2937;
      color: var(--text-tertiary);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .btn-loader {
      animation: spin 1s linear infinite;
    }

    /* Output card styling (Hidden by default) */
    .output-section {
      display: none; /* Hidden by default */
    }

    .output-section.visible {
      display: block; /* Visible only after success */
      animation: fadeInUp 0.75s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 20px;
    }

    .output-title-wrapper {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brief-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
      color: var(--primary);
      background: rgba(139, 92, 246, 0.12);
      padding: 4px 10px;
      border-radius: 9999px;
      border: 1px solid rgba(139, 92, 246, 0.2);
    }

    .brief-title {
      font-family: 'Outfit', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: #ffffff;
      margin-top: 4px;
    }

    .action-controls {
      display: flex;
      gap: 8px;
    }

    .action-icon-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--card-border);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    .action-icon-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      transform: translateY(-2px);
    }

    /* Output Grid Layout */
    .brief-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    /* Key Points section styling */
    .section-card {
      background: rgba(17, 24, 39, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: var(--radius-md);
      padding: 24px;
      transition: var(--transition-smooth);
    }

    .section-card:hover {
      border-color: rgba(255, 255, 255, 0.08);
      background: rgba(17, 24, 39, 0.5);
    }

    .section-label {
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .label-icon {
      font-size: 1.1rem;
    }

    .label-icon.points { color: var(--primary); }
    .label-icon.insight { color: var(--secondary); }
    .label-icon.action { color: var(--accent); }

    .key-points-list {
      list-style-type: none;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .key-point-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      line-height: 1.6;
      font-size: 1rem;
    }

    .point-number {
      background: rgba(139, 92, 246, 0.15);
      color: var(--primary);
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
      border: 1px solid rgba(139, 92, 246, 0.25);
    }

    .insight-content {
      line-height: 1.6;
      font-size: 1.05rem;
      font-style: italic;
      color: #e2e8f0;
      border-left: 3px solid var(--secondary);
      padding-left: 16px;
    }

    .action-card {
      border: 1px solid rgba(16, 185, 129, 0.15);
      background: rgba(16, 185, 129, 0.02);
    }

    .action-card:hover {
      border-color: rgba(16, 185, 129, 0.3);
      background: rgba(16, 185, 129, 0.04);
    }

    .action-step-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .action-checkbox {
      background: rgba(16, 185, 129, 0.15);
      color: var(--accent);
      width: 26px;
      height: 26px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
      margin-top: 2px;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .action-text {
      line-height: 1.6;
      font-size: 1rem;
      font-weight: 500;
      color: #e2e8f0;
    }

    /* Alerts and errors */
    .alert {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px;
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      line-height: 1.5;
      animation: fadeIn 0.3s ease-out forwards;
    }

    .alert-danger {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }

    .alert-danger i {
      color: var(--danger);
      margin-top: 3px;
      font-size: 1.1rem;
    }

    /* Footer styles */
    footer {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-tertiary);
      margin-top: 40px;
    }

    footer a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: var(--transition-smooth);
    }

    footer a:hover {
      color: var(--primary);
    }

    /* Animations */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse-glow {
      0% { filter: drop-shadow(0 0 2px rgba(192, 132, 252, 0.3)); }
      100% { filter: drop-shadow(0 0 12px rgba(236, 72, 153, 0.6)); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Media Queries for responsive screens */
    @media (max-width: 640px) {
      .app-container {
        padding: 24px 16px;
        gap: 24px;
      }
      
      h1 {
        font-size: 2.2rem;
      }

      .subtitle {
        font-size: 0.95rem;
      }

      .glass-card {
        padding: 24px 16px;
        border-radius: var(--radius-md);
      }

      .brief-title {
        font-size: 1.6rem;
      }

      .section-card {
        padding: 16px;
      }
    }
  </style>
</head>
<body>

  <!-- Glowing background elements -->
  <div class="bg-glow-container">
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>
    <div class="bg-glow glow-3"></div>
  </div>
  <div class="bg-grid"></div>

  <!-- React mounting point -->
  <div id="root"></div>

  <script type="text/babel">
    // Define the hardcoded API key variable as required in Layer 4
    const GEMINI_API_KEY = "";

    const { useState, useEffect } = React;

    function App() {
      const [topic, setTopic] = useState("");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [briefData, setBriefData] = useState(null);
      
      // Fallback API Key configuration
      const [apiKeyInput, setApiKeyInput] = useState(() => {
        return localStorage.getItem("GEMINI_USER_KEY") || "";
      });
      const [showSettings, setShowSettings] = useState(!GEMINI_API_KEY && !apiKeyInput);

      // Effect to control body class for live background speed changes
      useEffect(() => {
        if (loading) {
          document.body.classList.add("generating");
        } else {
          document.body.classList.remove("generating");
        }
      }, [loading]);

      // Predefined suggestion topics
      const suggestions = [
        { label: "Artificial Intelligence", icon: "fa-brain" },
        { label: "Remote Jobs", icon: "fa-laptop-house" },
        { label: "Cryptocurrency", icon: "fa-coins" },
        { label: "Fitness", icon: "fa-heartbeat" },
        { label: "Digital Marketing", icon: "fa-bullhorn" },
        { label: "Productivity Tips", icon: "fa-lightbulb" }
      ];

      const activeApiKey = GEMINI_API_KEY || apiKeyInput;

      // Handle storing custom API key
      const handleApiKeyChange = (e) => {
        const value = e.target.value;
        setApiKeyInput(value);
        localStorage.setItem("GEMINI_USER_KEY", value);
      };

      // Clean JSON returned from the model (stripping any formatting blocks)
      const cleanJsonString = (str) => {
        let clean = str.trim();
        if (clean.startsWith("```json")) {
          clean = clean.substring(7);
        } else if (clean.startsWith("```")) {
          clean = clean.substring(3);
        }
        if (clean.endsWith("```")) {
          clean = clean.substring(0, clean.length - 3);
        }
        return clean.trim();
      };

      // API Call Handler
      const handleGenerateBrief = async (e) => {
        if (e) e.preventDefault();
        
        if (!topic.trim()) {
          setError("Please specify a topic first.");
          return;
        }

        if (!activeApiKey) {
          setError("API Key is missing. Please enter a valid Gemini API Key.");
          setShowSettings(true);
          return;
        }

        setLoading(true);
        setError(null);
        // We do NOT clear the previous brief immediately, but hide/fade it so we transition smoothly
        
        try {
          const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${activeApiKey}`;
          
          const payload = {
            contents: [
              {
                role: "user",
                parts: [{ text: `Topic: ${topic.trim()}` }]
              }
            ],
            systemInstruction: {
              parts: [{
                text: `You are the AI Topic Brief generator. Generate a structured summary/brief for the topic in JSON format containing:
1. title: A short, engaging title related to the topic.
2. keyPoints: An array containing exactly three important, key points about the topic.
3. insight: One useful, non-obvious observation or insight about the topic.
4. actionStep: One practical action the user can take to learn or explore the topic further.`
              }]
            },
            generationConfig: {
              responseMimeType: "application/json",
              responseSchema: {
                type: "OBJECT",
                properties: {
                  title: { type: "STRING" },
                  keyPoints: {
                    type: "ARRAY",
                    items: { type: "STRING" },
                    description: "Exactly three key points about the topic."
                  },
                  insight: { type: "STRING" },
                  actionStep: { type: "STRING" }
                },
                required: ["title", "keyPoints", "insight", "actionStep"]
              }
            }
          };

          const response = await fetch(endpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            const errMsg = errData.error?.message || `HTTP ${response.status} Error`;
            throw new Error(errMsg);
          }

          const resData = await response.json();
          const responseText = resData.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (!responseText) {
            throw new Error("Invalid response format received from Gemini.");
          }

          const parsedData = JSON.parse(cleanJsonString(responseText));
          
          // Set state
          setBriefData(parsedData);
        } catch (err) {
          console.error("API Call Failed: ", err);
          setError(err.message || "An unexpected error occurred while contacting Gemini AI.");
        } finally {
          setLoading(false);
        }
      };

      // Quick-select dynamic suggestions
      const selectSuggestion = (suggestionText) => {
        setTopic(suggestionText);
      };

      const copyToClipboard = () => {
        if (!briefData) return;
        const textToCopy = `Topic Brief: ${briefData.title}
        
Key Points:
1. ${briefData.keyPoints[0]}
2. ${briefData.keyPoints[1]}
3. ${briefData.keyPoints[2]}

Insight:
${briefData.insight}

Action Step:
${briefData.actionStep}`;

        navigator.clipboard.writeText(textToCopy)
          .then(() => {
            alert("Topic brief copied to clipboard!");
          })
          .catch(err => {
            console.error("Failed to copy text: ", err);
          });
      };

      return (
        <div className="app-container">
          <header>
            <div className="logo-container">
              <i className="fa-solid fa-brain logo-icon"></i>
            </div>
            <h1>Topic Brief Generator</h1>
            <p className="subtitle">
              Quickly grasp any subject with structured, AI-generated summaries without searching multiple sites.
            </p>
          </header>

          {/* API Key Panel */}
          <div className="glass-card api-key-panel">
            <div className="api-key-header" onClick={() => setShowSettings(!showSettings)}>
              <span className="api-key-title">
                <i className="fa-solid fa-key"></i>
                API Key Configuration
              </span>
              <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                <span className={`api-key-badge ${activeApiKey ? 'success' : ''}`}>
                  {activeApiKey ? 'Configured' : 'Missing'}
                </span>
                <i className={`fa-solid ${showSettings ? 'fa-chevron-up' : 'fa-chevron-down'}`} style={{ color: 'var(--text-secondary)' }}></i>
              </div>
            </div>

            {showSettings && (
              <div className="api-key-content">
                <div className="input-wrapper">
                  <i className="fa-solid fa-lock input-icon"></i>
                  <input
                    type="password"
                    className="input-field"
                    placeholder={GEMINI_API_KEY ? "API key hardcoded in constant" : "Enter your Google Gemini API Key"}
                    value={apiKeyInput}
                    onChange={handleApiKeyChange}
                    disabled={!!GEMINI_API_KEY}
                  />
                </div>
                <p className="api-key-hint">
                  {GEMINI_API_KEY ? (
                    <span>Using the key defined inside <code>GEMINI_API_KEY</code> constant in index.html.</span>
                  ) : (
                    <span>
                      The API key is stored locally in your browser. Get a free API key at <a href="https://aistudio.google.com/" target="_blank" rel="noopener noreferrer">Google AI Studio <i className="fa-solid fa-up-right-from-square" style={{ fontSize: '0.75rem' }}></i></a>.
                    </span>
                  )}
                </p>
              </div>
            )}
          </div>

          {/* Search Card */}
          <div className="glass-card">
            <form className="brief-form" onSubmit={handleGenerateBrief}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                <label style={{ fontSize: '0.9rem', fontWeight: 600, color: 'var(--text-secondary)' }}>Enter a topic to explore</label>
                <div className="input-wrapper">
                  <i className="fa-solid fa-magnifying-glass input-icon"></i>
                  <input
                    type="text"
                    className="input-field"
                    placeholder="e.g., Artificial Intelligence, Photosynthesis, Stock Market..."
                    value={topic}
                    onChange={(e) => setTopic(e.target.value)}
                    required
                  />
                </div>
              </div>

              {/* Suggestion Chips */}
              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                <span style={{ fontSize: '0.85rem', color: 'var(--text-tertiary)' }}>Popular Topics:</span>
                <div className="suggestions-container">
                  {suggestions.map((sug, idx) => (
                    <div
                      key={idx}
                      className={`suggestion-chip ${topic.toLowerCase() === sug.label.toLowerCase() ? 'active' : ''}`}
                      onClick={() => selectSuggestion(sug.label)}
                    >
                      <i className={`fa-solid ${sug.icon}`}></i>
                      {sug.label}
                    </div>
                  ))}
                </div>
              </div>

              {/* Error Handler */}
              {error && (
                <div className="alert alert-danger">
                  <i className="fa-solid fa-circle-exclamation"></i>
                  <div>
                    <strong>Generation Failed: </strong>
                    {error}
                  </div>
                </div>
              )}

              {/* Generate Button */}
              <button
                type="submit"
                className="generate-btn"
                disabled={loading || !topic.trim()}
              >
                {loading ? (
                  <>
                    <i className="fa-solid fa-circle-notch btn-loader"></i>
                    Generating Topic Brief...
                  </>
                ) : (
                  <>
                    <i className="fa-solid fa-wand-magic-sparkles"></i>
                    Generate Topic Brief
                  </>
                )}
              </button>
            </form>
          </div>

          {/* Output Section - hidden by default with CSS 'display: none', gets 'visible' class upon successful API response */}
          <div className={`glass-card output-section ${briefData && !error ? 'visible' : ''}`}>
            {briefData && (
              <div>
                <div className="output-header">
                  <div className="output-title-wrapper">
                    <span className="brief-badge">
                      <i className="fa-solid fa-sparkles"></i> Topic Brief
                    </span>
                    <h2 className="brief-title">{briefData.title}</h2>
                  </div>
                  
                  <div className="action-controls">
                    <button className="action-icon-btn" onClick={copyToClipboard} title="Copy to Clipboard">
                      <i className="fa-regular fa-copy"></i>
                    </button>
                  </div>
                </div>

                <div className="brief-grid">
                  {/* Key Points */}
                  <div className="section-card">
                    <h3 className="section-label">
                      <i className="fa-solid fa-list-check label-icon points"></i>
                      Key Points
                    </h3>
                    <ul className="key-points-list">
                      {briefData.keyPoints.map((point, index) => (
                        <li key={index} className="key-point-item">
                          <span className="point-number">{index + 1}</span>
                          <span className="point-text">{point}</span>
                        </li>
                      ))}
                    </ul>
                  </div>

                  {/* Insight */}
                  <div className="section-card">
                    <h3 className="section-label">
                      <i className="fa-solid fa-lightbulb label-icon insight"></i>
                      Key Insight
                    </h3>
                    <div className="insight-content">
                      {briefData.insight}
                    </div>
                  </div>

                  {/* Action Step */}
                  <div className="section-card action-card">
                    <h3 className="section-label">
                      <i className="fa-solid fa-compass label-icon action"></i>
                      Recommended Action Step
                    </h3>
                    <div className="action-step-item">
                      <div className="action-checkbox">
                        <i className="fa-solid fa-check"></i>
                      </div>
                      <div className="action-text">
                        {briefData.actionStep}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>

          <footer>
            <p>Powered by Google Gemini 1.5 Flash API</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
