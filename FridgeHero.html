<!DOCTYPE html>
<html lang="en" ng-app="fridgeHeroApp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fridge HERO - AI Recipe Generator</title>
  
  <!-- Google Fonts: Outfit for sleek modern styling -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <!-- AngularJS CDN -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

  <style>
    /* Design Tokens */
    :root {
      --neon-lime: #ccff00;
      --lime-yellow: #e6ff2e;
      --light-green: #6ae68e;
      --bg-dark: #090b0e;
      --card-bg: #13171c;
      --card-border: rgba(204, 255, 0, 0.15);
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --error-bg: rgba(239, 68, 68, 0.1);
      --error-border: rgba(239, 68, 68, 0.3);
      --error-text: #f87171;
      --accent-gradient: linear-gradient(135deg, var(--neon-lime) 0%, var(--light-green) 100%);
      --glass-glow: 0 0 25px rgba(204, 255, 0, 0.05);
    }

    /* Base reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(204, 255, 0, 0.03) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(106, 230, 142, 0.03) 0%, transparent 40%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    /* Centered Main Card Layout */
    .hero-card {
      width: 100%;
      max-width: 500px;
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), var(--glass-glow);
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }

    .hero-card:hover {
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.7), 0 0 35px rgba(204, 255, 0, 0.08);
      border-color: rgba(204, 255, 0, 0.25);
    }

    /* Typography & Header */
    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .hero-title {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .title-fridge {
      color: var(--text-primary);
    }

    .title-hero {
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 8px rgba(204, 255, 0, 0.3));
    }

    .hero-subtitle {
      font-size: 0.95rem;
      color: var(--text-secondary);
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    /* Form Fields */
    .form-group {
      margin-bottom: 1.25rem;
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      transition: color 0.25s ease;
    }

    .form-group:focus-within label {
      color: var(--neon-lime);
    }

    .input-field {
      width: 100%;
      height: 50px;
      padding: 0.85rem 1.1rem;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text-primary);
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .input-field:focus {
      outline: none;
      border-color: var(--neon-lime);
      background-color: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 14px rgba(204, 255, 0, 0.15);
    }

    .input-field::placeholder {
      color: var(--text-muted);
    }

    /* Action Button */
    .btn-cook {
      width: 100%;
      height: 54px;
      background: var(--accent-gradient);
      border: none;
      border-radius: 12px;
      color: var(--bg-dark);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 1.5rem;
      box-shadow: 0 4px 15px rgba(204, 255, 0, 0.15);
    }

    .btn-cook:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(204, 255, 0, 0.35);
      filter: brightness(1.05);
    }

    .btn-cook:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 4px 10px rgba(204, 255, 0, 0.15);
    }

    .btn-cook:disabled {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Cooking Pulsing Spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2.5px solid var(--text-muted);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error Alert */
    .error-alert {
      background-color: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      color: var(--error-text);
      font-size: 0.9rem;
      line-height: 1.4;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      animation: fadeIn 0.3s ease;
    }

    /* Recipe Output Card */
    .recipe-card {
      margin-top: 2rem;
      padding: 1.75rem;
      background-color: rgba(204, 255, 0, 0.02);
      border: 1px dashed rgba(204, 255, 0, 0.25);
      border-radius: 16px;
      animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Dynamic Reveal Display Rules */
    .recipe-hidden {
      display: none !important;
    }

    .recipe-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 1.5rem;
      line-height: 1.3;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 1rem;
    }

    .recipe-steps {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .recipe-step-item {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
    }

    .step-number {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: var(--accent-gradient);
      border-radius: 50%;
      color: var(--bg-dark);
      font-size: 0.85rem;
      font-weight: 800;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(204, 255, 0, 0.2);
    }

    .step-text {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* Footer Details */
    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    /* Keyframes */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive adjustments */
    @media (max-width: 480px) {
      body {
        padding: 1rem;
      }
      
      .hero-card {
        padding: 2rem 1.25rem;
      }

      .hero-title {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body ng-controller="FridgeHeroController">

  <main class="hero-card">
    <header>
      <h1 class="hero-title">
        <span class="title-fridge">Fridge</span>
        <span class="title-hero">HERO</span>
      </h1>
      <p class="hero-subtitle">Turn three simple ingredients into culinary magic</p>
    </header>

    <!-- Error alert display -->
    <div class="error-alert" ng-if="error" role="alert" aria-live="polite">
      <svg style="flex-shrink:0;" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
      </svg>
      <span>{{ error }}</span>
    </div>

    <!-- Ingredients Form -->
    <form name="cookForm" ng-submit="cookMagic()" novalidate>
      <div class="form-group">
        <label for="ingredient1">Ingredient 1</label>
        <input 
          type="text" 
          id="ingredient1" 
          name="ingredient1" 
          class="input-field" 
          placeholder="e.g., bread" 
          ng-model="ingredients.one" 
          required 
          autocomplete="off">
      </div>

      <div class="form-group">
        <label for="ingredient2">Ingredient 2</label>
        <input 
          type="text" 
          id="ingredient2" 
          name="ingredient2" 
          class="input-field" 
          placeholder="e.g., eggs" 
          ng-model="ingredients.two" 
          required 
          autocomplete="off">
      </div>

      <div class="form-group">
        <label for="ingredient3">Ingredient 3</label>
        <input 
          type="text" 
          id="ingredient3" 
          name="ingredient3" 
          class="input-field" 
          placeholder="e.g., peanut butter" 
          ng-model="ingredients.three" 
          required 
          autocomplete="off">
      </div>

      <!-- Prominent Magic Button -->
      <button 
        type="submit" 
        class="btn-cook" 
        ng-disabled="cookForm.$invalid || loading">
        <span ng-if="loading" class="spinner" aria-hidden="true"></span>
        <span ng-if="loading">Cooking...</span>
        <span ng-if="!loading">COOK MAGIC 🪄</span>
      </button>
    </form>

    <!-- Recipe Output Card - Hidden by default using custom class if no recipe -->
    <section 
      class="recipe-card" 
      ng-class="{'recipe-hidden': !recipe}" 
      aria-live="polite">
      <h2 class="recipe-title">{{ recipe.dishName }}</h2>
      <ol class="recipe-steps">
        <li class="recipe-step-item">
          <span class="step-number">1</span>
          <span class="step-text">{{ recipe.step1 }}</span>
        </li>
        <li class="recipe-step-item">
          <span class="step-number">2</span>
          <span class="step-text">{{ recipe.step2 }}</span>
        </li>
        <li class="recipe-step-item">
          <span class="step-number">3</span>
          <span class="step-text">{{ recipe.step3 }}</span>
        </li>
      </ol>
    </section>
  </main>

  <footer>
    <p>Powered by Google Gemini 2.5 Flash</p>
  </footer>

  <!-- AngularJS App Script -->
  <script>
    // Store API key. User will paste their key here.
    const GEMINI_API_KEY = '';

    angular.module('fridgeHeroApp', [])
      .controller('FridgeHeroController', ['$scope', '$http', function($scope, $http) {
        // Model setup
        $scope.ingredients = {
          one: '',
          two: '',
          three: ''
        };
        $scope.loading = false;
        $scope.error = '';
        $scope.recipe = null;

        // Cook Magic submission handler
        $scope.cookMagic = function() {
          if ($scope.cookForm.$invalid) {
            return;
          }

          $scope.loading = true;
          $scope.error = '';
          $scope.recipe = null;

          // Check if API key is populated
          if (!GEMINI_API_KEY || GEMINI_API_KEY.trim() === '') {
            $scope.error = 'Gemini API Key is missing. Please open index.html and set the GEMINI_API_KEY variable with a valid key.';
            $scope.loading = false;
            return;
          }

          // Build post payload
          const prompt = "i have 3 ingridients: " + $scope.ingredients.one + ", " + $scope.ingredients.two + ", " + $scope.ingredients.three + ".Suggest one creative fancy dish name and 3 cooking steps \nFormat: Dish name :.... Step1:....Step2:.....Step3:....";
          
          const requestBody = {
            contents: [{
              parts: [{
                text: prompt
              }]
            }]
          };

          const endpoint = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + GEMINI_API_KEY;

          // POST call using AngularJS $http service
          $http.post(endpoint, requestBody)
            .then(function(response) {
              try {
                // Safely navigate the API response
                const candidates = response.data.candidates;
                if (candidates && candidates.length > 0 && candidates[0].content && candidates[0].content.parts.length > 0) {
                  const textResponse = candidates[0].content.parts[0].text;
                  $scope.recipe = parseRecipeResponse(textResponse);
                } else {
                  throw new Error('Invalid response structure received from Gemini API.');
                }
              } catch (e) {
                $scope.error = 'Failed to parse the recipe. The AI returned an unexpected format. Please try again.';
                console.error('Parsing error:', e);
              }
            })
            .catch(function(err) {
              console.error('API request failed:', err);
              if (err.data && err.data.error && err.data.error.message) {
                $scope.error = 'API Error: ' + err.data.error.message;
              } else {
                $scope.error = 'Unable to connect to Google Gemini API. Please check your internet connection and verify that your API key is correct.';
              }
            })
            .finally(function() {
              $scope.loading = false;
            });
        };

        // Helper to parse the requested Gemini response pattern:
        // Format: Dish name :.... Step1:....Step2:.....Step3:....
        function parseRecipeResponse(text) {
          console.log('Raw Gemini Output:', text);
          
          // Strip potential markdown emphasis symbols (e.g. **)
          const cleanText = text.replace(/\*\*/g, '').trim();

          let dishName = '';
          let step1 = '';
          let step2 = '';
          let step3 = '';

          // 1. Try match via strict regex
          const dishRegex = /(?:Dish\s*name\s*:|Dish\s*Name\s*:)([\s\S]*?)(?:Step\s*1\s*:|Step1\s*:)/i;
          const step1Regex = /(?:Step\s*1\s*:|Step1\s*:)([\s\S]*?)(?:Step\s*2\s*:|Step2\s*:)/i;
          const step2Regex = /(?:Step\s*2\s*:|Step2\s*:)([\s\S]*?)(?:Step\s*3\s*:|Step3\s*:)/i;
          const step3Regex = /(?:Step\s*3\s*:|Step3\s*:)([\s\S]*)$/i;

          const dishMatch = cleanText.match(dishRegex);
          const step1Match = cleanText.match(step1Regex);
          const step2Match = cleanText.match(step2Regex);
          const step3Match = cleanText.match(step3Regex);

          if (dishMatch) dishName = dishMatch[1].trim();
          if (step1Match) step1 = step1Match[1].trim();
          if (step2Match) step2 = step2Match[1].trim();
          if (step3Match) step3 = step3Match[1].trim();

          // 2. Fallback parser if regex fails (e.g. line-by-line keyword parsing)
          if (!dishName || !step1 || !step2 || !step3) {
            const lines = cleanText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            let activeSection = '';

            for (let line of lines) {
              if (/^Dish\s*name\s*:/i.test(line)) {
                dishName = line.replace(/^Dish\s*name\s*:/i, '').trim();
                activeSection = 'dish';
              } else if (/^(?:Step\s*1|Step1)\s*:/i.test(line)) {
                step1 = line.replace(/^(?:Step\s*1|Step1)\s*:/i, '').trim();
                activeSection = 'step1';
              } else if (/^(?:Step\s*2|Step2)\s*:/i.test(line)) {
                step2 = line.replace(/^(?:Step\s*2|Step2)\s*:/i, '').trim();
                activeSection = 'step2';
              } else if (/^(?:Step\s*3|Step3)\s*:/i.test(line)) {
                step3 = line.replace(/^(?:Step\s*3|Step3)\s*:/i, '').trim();
                activeSection = 'step3';
              } else {
                // Continuation line logic
                if (activeSection === 'dish') dishName += ' ' + line;
                else if (activeSection === 'step1') step1 += ' ' + line;
                else if (activeSection === 'step2') step2 += ' ' + line;
                else if (activeSection === 'step3') step3 += ' ' + line;
              }
            }
          }

          // 3. Fallback defaults if parsing was completely unable to find values
          return {
            dishName: dishName || 'Creative Ingredient Medley',
            step1: step1 || 'Prep and combine the three ingredients.',
            step2: step2 || 'Cook carefully over medium heat.',
            step3: step3 || 'Plate beautifully, garnish, and enjoy!'
          };
        }
      }]);
  </script>
</body>
</html>
